<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="pen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>

  <!-- Notebook pages -->
  <rect x="80" y="80" width="300" height="360" rx="8" fill="white" opacity="0.95"/>
  <rect x="88" y="88" width="284" height="344" rx="4" fill="#f8fafc"/>

  <!-- Text lines -->
  <line x1="130" y1="150" x2="340" y2="150" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round"/>
  <line x1="130" y1="185" x2="330" y2="185" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round"/>
  <line x1="130" y1="220" x2="350" y2="220" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round"/>
  <line x1="130" y1="255" x2="310" y2="255" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round"/>
  <line x1="130" y1="290" x2="340" y2="290" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round"/>
  <line x1="130" y1="325" x2="280" y2="325" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round"/>

  <!-- Red bookmark tab -->
  <path d="M280 88 L280 60 Q280 50 290 50 L310 50 Q320 50 320 60 L320 130 Q320 140 310 135 L300 128 L290 135 Q280 140 280 130 Z" fill="url(#pen)"/>

  <!-- Pen -->
  <g transform="translate(360, 380) rotate(-45)">
    <rect x="-6" y="-80" width="12" height="100" rx="4" fill="#1e293b"/>
    <polygon points="-6,-80 6,-80 0,-110" fill="#fbbf24"/>
    <rect x="-6" y="20" width="12" height="8" rx="2" fill="#f59e0b"/>
  </g>
</svg>
